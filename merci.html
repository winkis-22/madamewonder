<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message envoyé - Madame Wonder</title>
    <link rel="stylesheet" href="style_global.css">
    <style>
        body{
            background-color: #d8d8d8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .success-box{
            background-color: rgb(0,100,70);
            color: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 500px;
            margin: 20px;
        }
        .success-box h1 { color: rgb(212,175,55); margin-bottom: 20px;}
        .success-box a{
            display: inline-block;
            margin-top: 20px;
            color: rgb(212,175,55);
            text-decoration: none;
            font-weight: bold;
        }
        .success-box a:hover { color:white}
    </style>
</head>
<body>
    <div class="success-box">
        <h1><strong>Message envoyé</strong></h1>
        <p>Merci pour votre message.</p>
        <p>Nous vous repondrons dans les plus brefs délais.</p>
        <a href="index.html">Retour à l'acceuil</a>
    </div>
</body>
</html>
